<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meow.js Demo - Cat Chaos Playground 🐱</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #f0e6ff, #ffe6f0);
      margin: 0;
      padding: 40px 20px;
      color: #333;
    }
    h1 { color: #6b4e9e; }
    .cat { 
      width: 240px; 
      margin: 20px auto; 
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      display: block;
    }
    button {
      margin: 6px;
      padding: 12px 18px;
      font-size: 15px;
      background: #6b4e9e;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
    }
    button:hover { background: #9b7dd4; transform: scale(1.05); }
  </style>
</head>
<body>

  <h1>🐱 Meow.js Demo</h1>
  <p>Click any button to see cat magic!</p>
  
  <img src="https://picsum.photos/id/1015/400/400" class="cat" id="main-cat" alt="cute cat">

  <div>
    <button onclick="Meow.zoomies('#main-cat')">Zoomies</button>
    <button onclick="Meow.catnip('#main-cat')">🐾 Catnip</button>
    <button onclick="Meow.pounce('#main-cat')">Pounce</button>
    <button onclick="Meow.tailWag('#main-cat')">Tail Wag</button>
    <button onclick="Meow.stretch('#main-cat')">Stretch</button>
    <button onclick="Meow.loaf('#main-cat')">Loaf</button>
    <button onclick="Meow.knockOver('#main-cat')">Knock Over</button>
    <button onclick="Meow.chaseLaser('#main-cat')">Laser Mode</button>
    <button onclick="Meow.carry('#main-cat')">Carry Me</button>
    <button onclick="Meow.boop('#main-cat')">Boop</button>
    <button onclick="Meow.pawPrints(20)">Paw Prints</button>
    <button onclick="Meow.fishRain(20)">Fish Rain</button>
    <button onclick="Meow.meowSound()">Meow Sound</button>
  </div>

  <!-- Important: Load meow.js first -->
  <script src="meow.js"></script>
  <script>
    console.log("Meow.js version:", Meow.version);
    Meow.giveFact();
  </script>
</body>
</html>
