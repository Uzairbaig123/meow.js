<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meow.js Demo - Cat Chaos Playground 🐱</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #f0e6ff, #ffe6f0);
      margin: 0;
      padding: 40px 20px;
      color: #333;
    }
    h1 { color: #6b4e9e; margin-bottom: 10px; }
    .cat { 
      width: 220px; 
      margin: 20px; 
      border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      cursor: pointer;
    }
    .buttons {
      max-width: 800px;
      margin: 30px auto;
    }
    button {
      margin: 8px;
      padding: 14px 20px;
      font-size: 16px;
      background: #6b4e9e;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      background: #9b7dd4;
      transform: scale(1.08);
    }
  </style>
</head>
<body>

  <h1>🐱 Welcome to Meow.js Demo</h1>
  <p>Click the buttons and play with the cat!</p>
  
  <img src="https://picsum.photos/id/1015/400/400" 
     class="cat" 
     id="main-cat" 
     alt="Cute cat for Meow.js demo" 
     onerror="this.src='https://placekitten.com/400/400'">

  <div class="buttons">
    <button onclick="Meow.zoomies('#main-cat')">Zoomies</button>
    <button onclick="Meow.catnip('#main-cat')">🐾 Catnip Mode</button>
    <button onclick="Meow.pounce('#main-cat')">Pounce</button>
    <button onclick="Meow.tailWag('#main-cat')">Tail Wag</button>
    <button onclick="Meow.stretch('#main-cat')">Stretch</button>
    <button onclick="Meow.loaf('#main-cat')">Loaf</button>
    <button onclick="Meow.knockOver('#main-cat')">Knock Over</button>
    <button onclick="Meow.chaseLaser('#main-cat')">Laser Mode</button>
    <button onclick="Meow.carry('#main-cat')">Carry Me</button>
    <button onclick="Meow.boop('#main-cat')">Boop Mode</button>
    <button onclick="Meow.pawPrints(25)">Paw Prints</button>
    <button onclick="Meow.fishRain(20)">Fish Rain</button>
    <button onclick="Meow.meowSound('long')">Meow Sound</button>
  </div>

  <script src="meow.js"></script>
  <script>
    // Auto start some fun
    Meow.tailWag("#main-cat");
    Meow.boop("#main-cat");
    Meow.pawPrints(10);
    Meow.giveFact();
  </script>
</body>
</html>
